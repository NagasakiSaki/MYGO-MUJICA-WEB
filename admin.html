<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 — MYGO-MUJICA-WEB</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f5f5f5; --surface: #fff; --text: #2c2c2c;
      --text-muted: #6b6b6b; --accent: #7b5ea7; --danger: #e05555;
      --border: #e0e0e0; --radius: 8px;
    }
    body { font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
    .admin-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.8rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    .admin-header h1 { font-size: 1.1rem; }
    .admin-header a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
    .admin-header a:hover { color: var(--accent); }
    .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }

    /* Login */
    .login-box { max-width: 360px; margin: 5rem auto; background: var(--surface); border-radius: var(--radius); padding: 2rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
    .login-box h2 { margin-bottom: 1.25rem; }
    .login-box input { width: 100%; padding: 0.6rem 0.8rem; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; margin-bottom: 0.75rem; }
    .login-box .hint { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; }

    /* Tabs */
    .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 1.5rem; }
    .tab-btn { padding: 0.6rem 1.2rem; border: none; background: none; cursor: pointer; font-size: 0.95rem; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color 0.15s, border-color 0.15s; }
    .tab-btn:hover { color: var(--accent); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Form */
    .form-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
    .form-section h3 { font-size: 1rem; margin-bottom: 1rem; }
    .form-row { margin-bottom: 0.75rem; }
    .form-row label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.2rem; }
    .form-row input, .form-row textarea { width: 100%; padding: 0.5rem 0.7rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; font-family: inherit; }
    .form-row textarea { min-height: 80px; resize: vertical; }
    .form-actions { display: flex; gap: 0.6rem; margin-top: 1rem; }
    .btn { padding: 0.5rem 1.2rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.8rem; }

    /* Item list */
    .item-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .item-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.8rem 1rem; display: flex; justify-content: space-between; align-items: center; }
    .item-row .info { flex: 1; min-width: 0; }
    .item-row .title { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-row .meta { font-size: 0.82rem; color: var(--text-muted); margin-top: 0.15rem; }
    .item-row .actions { display: flex; gap: 0.4rem; flex-shrink: 0; margin-left: 1rem; }

    .sub-section { margin-bottom: 1.5rem; }
    .sub-section h4 { font-size: 0.9rem; color: var(--accent); margin-bottom: 0.6rem; padding-left: 0.5rem; border-left: 3px solid var(--accent); }

    .msg { padding: 0.5rem 0.8rem; border-radius: 6px; font-size: 0.85rem; margin-bottom: 0.75rem; display: none; }
    .msg.success { display: block; background: #e8f5e9; color: #2e7d32; }
    .msg.error { display: block; background: #fdecea; color: #c62828; }
  </style>
</head>
<body>

<header class="admin-header">
  <h1>管理后台</h1>
  <div>
    <a href="index.html" target="_blank">查看网站 →</a>
    &nbsp;&nbsp;
    <a href="#" onclick="doLogout()">退出</a>
  </div>
</header>

<div id="loginSection" class="login-box">
  <h2>管理后台登录</h2>
  <input type="password" id="loginPw" placeholder="输入密码">
  <div class="hint" id="loginHint">首次使用请直接设置密码</div>
  <button class="btn btn-primary" onclick="doLogin()" style="width:100%">进入</button>
</div>

<div id="mainSection" class="container" style="display:none">

  <!-- Site settings tab -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="tab-lit">文学创作</button>
    <button class="tab-btn" data-tab="tab-proj">代码项目</button>
    <button class="tab-btn" data-tab="tab-rec">推荐作品</button>
    <button class="tab-btn" data-tab="tab-site">网站设置</button>
  </div>

  <!-- Literature -->
  <div id="tab-lit" class="tab-content active">
    <div class="form-section" id="litForm">
      <h3 id="litFormTitle">新建文章</h3>
      <input type="hidden" id="litId">
      <div class="form-row"><label>标题</label><input type="text" id="litTitle"></div>
      <div class="form-row"><label>日期</label><input type="date" id="litDate"></div>
      <div class="form-row"><label>摘要</label><textarea id="litExcerpt"></textarea></div>
      <div class="form-row"><label>正文 (可选，Markdown 格式)</label><textarea id="litContent" style="min-height:160px"></textarea></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveLit()">保存</button>
        <button class="btn btn-outline" onclick="cancelLit()">取消</button>
      </div>
    </div>
    <div class="item-list" id="litList"></div>
  </div>

  <!-- Projects -->
  <div id="tab-proj" class="tab-content">
    <div class="form-section" id="projForm">
      <h3 id="projFormTitle">新建项目</h3>
      <input type="hidden" id="projId">
      <div class="form-row"><label>项目名称</label><input type="text" id="projName"></div>
      <div class="form-row"><label>简介</label><textarea id="projDesc"></textarea></div>
      <div class="form-row"><label>详细介绍</label><textarea id="projDetail" style="min-height:120px" placeholder="项目的详细说明、技术架构等..."></textarea></div>
      <div class="form-row"><label>技术标签 (逗号分隔)</label><input type="text" id="projTags" placeholder="HTML, CSS, JavaScript"></div>
      <div class="form-row"><label>项目链接 (可选)</label><input type="text" id="projLink" placeholder="https://github.com/..."></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveProj()">保存</button>
        <button class="btn btn-outline" onclick="cancelProj()">取消</button>
      </div>
    </div>
    <div class="item-list" id="projList"></div>
  </div>

  <!-- Recommendations -->
  <div id="tab-rec" class="tab-content">
    <div class="form-section" id="recForm">
      <h3 id="recFormTitle">新建推荐</h3>
      <input type="hidden" id="recId">
      <div class="form-row"><label>分类</label><select id="recCat" onchange="onRecCatChange()"><option value="books">书籍</option><option value="music">音乐</option><option value="films">影视</option></select></div>
      <div class="form-row"><label>标题</label><input type="text" id="recTitle"></div>
      <div class="form-row" id="recAuthorRow"><label>作者</label><input type="text" id="recAuthor"></div>
      <div class="form-row"><label>年份</label><input type="text" id="recYear"></div>
      <div class="form-row"><label>封面图片 URL (可选)</label><input type="text" id="recCover" placeholder="https://..."></div>
      <div class="form-row"><label>摘要 / 导语</label><textarea id="recExcerpt"></textarea></div>
      <div class="form-row"><label>推荐正文</label><textarea id="recReview" style="min-height:160px" placeholder="完整的推荐帖正文..."></textarea></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveRec()">保存</button>
        <button class="btn btn-outline" onclick="cancelRec()">取消</button>
      </div>
    </div>
    <div class="sub-section"><h4>书籍</h4><div class="item-list" id="recBooksList"></div></div>
    <div class="sub-section"><h4>音乐</h4><div class="item-list" id="recMusicList"></div></div>
    <div class="sub-section"><h4>影视</h4><div class="item-list" id="recFilmsList"></div></div>
  </div>

  <!-- Site settings -->
  <div id="tab-site" class="tab-content">
    <div class="form-section">
      <h3>网站信息</h3>
      <div class="form-row"><label>网站标题</label><input type="text" id="siteTitle"></div>
      <div class="form-row"><label>首页副标题</label><input type="text" id="siteSubtitle"></div>
      <div class="form-actions"><button class="btn btn-primary" onclick="saveSite()">保存</button></div>
    </div>
    <div class="form-section">
      <h3>修改密码</h3>
      <div class="form-row"><label>新密码 (留空则不修改)</label><input type="password" id="newPassword"></div>
      <div class="form-actions"><button class="btn btn-primary" onclick="changePassword()">修改密码</button></div>
    </div>
  </div>

</div>

<script src="js/store.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
